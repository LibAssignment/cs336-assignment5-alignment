[project]
name = "cs336-assignment5-alignment"

[sync]
exclude_dirs = [
  ".git",
  ".venv",
  "__pycache__",
  ".pytest_cache",
  ".mypy_cache",
  ".ruff_cache",
  ".pyre",
  ".hypothesis",
  "alignment.egg-info",
  "out",
]

exclude_files = [
  ".env",
  "*.pyc",
  "*.pyo",
  "*.log",
  "*.tmp",
  ".DS_Store",
]

include_ignored = [
  "wandb/config.json",
  "wandb/.gitignore",
]

[tasks]
train = { command = ["python", "scripts/make.py", "train"], uv = true }
train-olmo2 = { command = [
  "python", "scripts/make.py", "train",
  "--model", "olmo2-1B",
  "--prompt", "r1_zero_three_shot_gsm8k",
  "--device", "cuda:0",
  "--inference", "vllm",
  "--vllm-device", "cuda:1",
], uv = true }
profile-olmo2 = { command = [
  "python", "scripts/make.py", "profile",
  "--model", "olmo2-1B",
  "--prompt", "r1_zero_three_shot_gsm8k",
  "--device", "cuda:0",
  "--inference", "vllm",
  "--vllm-device", "cuda:1",
], uv = true }
smoke = { command = ["python", "scripts/make.py", "smoke"], uv = true }
jobs = { command = ["python", "scripts/make.py", "jobs"], uv = true }
make = { command = ["python", "scripts/make.py"], uv = true }
tune = { command = ["python", "scripts/tune.py"], uv = true }

[download.mappings]
wandb = "wandb"
jobs = "out/jobs"
tune = "out/tune"

[[setup.steps]]
kind = "uv"
extras = ["gpu"]

[[setup.steps]]
kind = "hf"
repo = "allenai/OLMo-2-0425-1B"
revision = "a1847dff35000b4271fa70afc5db10fd29fedbdf"
